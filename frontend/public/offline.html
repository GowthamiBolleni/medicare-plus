<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCare+ Offline Mode</title>
  <style>
    body {
      background-color: #0f172a;
      color: #f1f5f9;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    .card {
      background-color: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 40px 30px;
      text-align: center;
      max-width: 440px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }
    .icon {
      font-size: 48px;
      margin-bottom: 15px;
    }
    h1 {
      color: #f43f5e;
      margin-top: 0;
      font-size: 24px;
    }
    p {
      color: #94a3b8;
      line-height: 1.6;
      font-size: 15px;
    }
    .btn {
      background-color: #f43f5e;
      color: white;
      border: none;
      padding: 12px 24px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
      transition: background-color 0.2s, transform 0.1s;
      box-shadow: 0 4px 12px rgba(244, 63, 94, 0.3);
    }
    .btn:hover {
      background-color: #e11d48;
      transform: translateY(-1px);
    }
    .btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You are Offline</h1>
    <p>It looks like you don't have an active internet connection. MediCare+ has entered offline high-availability mode.</p>
    <p>Cached pages, schedules, and local profiles remain accessible. Once connection is restored, full real-time capabilities will resume.</p>
    <button class="btn" onclick="window.location.reload()">Retry Connection</button>
  </div>
</body>
</html>
