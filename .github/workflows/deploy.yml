name: MediCare+ CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr libtesseract-dev poppler-utils

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run Tests
      env:
        ENV: test
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        cd backend
        python -m unittest discover -s . -p "test_*.py"

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
    - uses: actions/checkout@v3
      with:
        persist-credentials: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Backend Docker Image
      run: |
        docker build -t medicare-backend:latest ./backend > backend_build.log 2>&1

    - name: Build Frontend Docker Image
      run: |
        docker build -t medicare-frontend:latest ./frontend > frontend_build.log 2>&1

    - name: Push Build Logs on Failure
      if: failure()
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git checkout -b build-error-branch || git checkout build-error-branch
        if [ -f backend_build.log ]; then
          cp backend_build.log build_error.log
        elif [ -f frontend_build.log ]; then
          cp frontend_build.log build_error.log
        else
          echo "No logs found" > build_error.log
        fi
        git add build_error.log
        git commit -m "chore: upload build logs for debugging"
        git push origin build-error-branch --force
